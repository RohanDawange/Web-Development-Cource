<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Learing HTML form">
    <link rel="stylesheet" href="style.css">
    <title>Forms</title>
</head>

<body>
    <h1>Application Form</h1>
    <form action="post">
        <div>
            <!--to add lable-->
            <label for="username">Enter Valid username</label><br>
            <input type="text" id="username" name="username" placeholder="Enter your user name"><br>
        </div>
        <div>
            <!--password input-->
            <input type="password" name="password" placeholder="Enter your password">
        </div>
        <div>
            <!--to add male/female option ()-->
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <!--Check box-->
            <h4>Subjects to learn</h4>
            <input type="checkbox" id="Computer Network" name="Computer Network" value="yes">
            <label for="Computer Network">Compter Network</label><br>

            <input type="checkbox" id="Cloud Computing" name="Cloud Computing" value="yes">
            <label for="Cloud Computing">Cloud Computing</label><br>

            <input type="checkbox" id="AI" name="AI" value="yes">
            <label for="AI">AI</label><br>

            <input type="checkbox" id="Python" name="Python" value="yes">
            <label for="Python">Python</label><br>
        </div>

        <!--Comment Box-->
        <div>
            <label for="comment">Enter Comment here</label><br>
            <textarea id="content" name="comment" rows="4" cols="50"></textarea>
        </div>

        <!--Select tag-->
        <pre>
            <select name="Branch" id="">
                <option value="Computer Engineering"></option>
                <option value="AIDS"></option>
                <option value="Mechanical"></option>
                <option value="E&TC"></option>
            </select>
        </pre>
    </form>

    <script src="script.js"></script>
</body>

</html>
